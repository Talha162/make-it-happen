name: make_it_happen
description: "Make it Happen project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  lucide_icons: ^0.257.0
  lottie: ^3.1.0
  animations: ^2.0.11
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

  fonts:
    - family: GeneralSans
      fonts:
        - asset: assets/fonts/GeneralSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/GeneralSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/GeneralSans-Semibold.ttf
          weight: 600
        - asset: assets/fonts/GeneralSans-Bold.ttf
          weight: 700
